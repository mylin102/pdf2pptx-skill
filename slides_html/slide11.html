<!DOCTYPE html>
<html>
<head>
<style>
  body { font-family: 'Helvetica', Arial, sans-serif; width: 720pt; height: 405pt; margin: 0; padding: 0; background-color: #F4F6F6; color: #1C2833; overflow: hidden; display: flex; }
  .slide { padding: 40pt; width: 640pt; height: 325pt; display: flex; flex-direction: column; }
  .h1-box { border-left: 10pt solid #1C2833; padding-left: 15pt; margin-bottom: 20pt; }
  h1 { font-size: 32pt; color: #1C2833; margin: 0; }
  .content { display: flex; gap: 20pt; }
  .box { flex: 1; background-color: white; padding: 15pt; border-radius: 8pt; border-top: 5pt solid #1C2833; }
  .box h3 { margin-top: 0; font-size: 20pt; color: #2E4053; margin-bottom: 10pt; }
  .box ul { font-size: 14pt; padding-left: 20pt; margin: 0; }
  li { margin-bottom: 10pt; }
</style>
</head>
<body>
<div class="slide">
  <div class="h1-box"><h1>深入解析：供需反轉與定價權</h1></div>
  <div class="content">
    <div class="box">
      <h3>記憶體反轉 (威剛)</h3>
      <ul>
        <li>Kioxia/Micron 大幅減產 SLC/MLC NAND。</li>
        <li>供給銳減 20-30%，引發客戶備貨潮。</li>
        <li>低價庫存優勢將帶動毛利率大幅跳升。</li>
      </ul>
    </div>
    <div class="box">
      <h3>被動元件與功率半導體</h3>
      <ul>
        <li>村田 (Murata) 調漲 MLCC 報價 20%。</li>
        <li>On Semi/Nexperia 調漲功率半導體報價。</li>
        <li>台廠迎來轉單效應，結束產業寒冬。</li>
      </ul>
    </div>
  </div>
</div>
</body>
</html>
