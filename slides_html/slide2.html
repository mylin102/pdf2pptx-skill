<!DOCTYPE html>
<html>
<head>
<style>
  body { font-family: 'Helvetica', Arial, sans-serif; width: 720pt; height: 405pt; margin: 0; padding: 0; background-color: #F4F6F6; color: #1C2833; overflow: hidden; display: flex; }
  .slide { padding: 40pt; width: 640pt; height: 325pt; display: flex; flex-direction: column; }
  .h1-box { border-left: 10pt solid #1C2833; padding-left: 15pt; margin-bottom: 20pt; }
  h1 { font-size: 32pt; color: #1C2833; margin: 0; }
  .content { display: flex; justify-content: space-between; gap: 20pt; }
  .box { background-color: #FFFFFF; padding: 20pt; border-radius: 10pt; flex: 1; }
  .highlight-text { color: #2E4053; font-weight: bold; font-size: 22pt; margin-bottom: 10pt; }
  p { font-size: 18pt; line-height: 1.6; margin: 0 0 10pt 0; }
</style>
</head>
<body>
<div class="slide">
  <div class="h1-box"><h1>核心見解：AI 驅動的長期重估</h1></div>
  <div class="content">
    <div class="box">
      <p class="highlight-text">典範轉移</p>
      <p>AI 基礎設施的快速擴張，正驅動半導體與資料中心供應鏈的長期重估。</p>
    </div>
    <div class="box">
      <p class="highlight-text">選股策略</p>
      <p>2024-2025 年，聚焦具備「定價權」與「關鍵技術護城河」的領先企業。</p>
    </div>
  </div>
  <div style="margin-top: 30pt; border-top: 1pt solid #AAB7B8; padding-top: 10pt;">
    <p style="font-style: italic; margin: 0;">目標：透過精準選股獲取超越市場的超額回報。</p>
  </div>
</div>
</body>
</html>
