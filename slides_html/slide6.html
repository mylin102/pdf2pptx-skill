<!DOCTYPE html>
<html>
<head>
<style>
  body { font-family: 'Helvetica', Arial, sans-serif; width: 720pt; height: 405pt; margin: 0; padding: 0; background-color: #F4F6F6; color: #1C2833; overflow: hidden; display: flex; }
  .slide { padding: 30pt 40pt; width: 640pt; height: 345pt; display: flex; flex-direction: column; }
  .h1-box { border-left: 10pt solid #1C2833; padding-left: 15pt; margin-bottom: 15pt; }
  h1 { font-size: 28pt; color: #1C2833; margin: 0; }
  .criteria { display: flex; flex-direction: column; gap: 10pt; }
  .item { display: flex; align-items: center; background-color: white; padding: 10pt; border-radius: 8pt; }
  .icon-box { background-color: #F4F6F6; width: 40pt; height: 40pt; display: flex; align-items: center; justify-content: center; margin-right: 15pt; border-radius: 5pt; }
  .icon-box p { font-size: 20pt; margin: 0; }
  .desc { flex: 1; }
  .desc h3 { margin: 0; font-size: 18pt; color: #2E4053; }
  .desc p { margin: 2pt 0 0 0; font-size: 14pt; line-height: 1.3; }
</style>
</head>
<body>
<div class="slide">
  <div class="h1-box"><h1>法人級選股標準</h1></div>
  <div class="criteria">
    <div class="item">
      <div class="icon-box"><p>🔍</p></div>
      <div class="desc">
        <h3>核心主題契合度</h3>
        <p>營收需高度暴露於液冷散熱、先進封裝或關鍵零組件漲價三大主軸。</p>
      </div>
    </div>
    <div class="item">
      <div class="icon-box"><p>📈</p></div>
      <div class="desc">
        <h3>2026 年獲利爆發力</h3>
        <p>預估 EPS 具備高度成長斜率 (YoY > 30-40%) 的高能見度個股。</p>
      </div>
    </div>
    <div class="item">
      <div class="icon-box"><p>🤝</p></div>
      <div class="desc">
        <h3>供應鏈實質受惠</h3>
        <p>獲大廠認證（如 NVL72 供應商）或接獲急單，排除純題材炒作。</p>
      </div>
    </div>
  </div>
</div>
</body>
</html>
