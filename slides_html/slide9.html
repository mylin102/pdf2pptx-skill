<!DOCTYPE html>
<html>
<head>
<style>
  body { font-family: 'Helvetica', Arial, sans-serif; width: 720pt; height: 405pt; margin: 0; padding: 0; background-color: #F4F6F6; color: #1C2833; overflow: hidden; display: flex; }
  .slide { padding: 30pt 40pt; width: 640pt; height: 345pt; display: flex; flex-direction: column; }
  .h1-box { border-left: 10pt solid #1C2833; padding-left: 15pt; margin-bottom: 10pt; }
  h1 { font-size: 28pt; color: #1C2833; margin: 0; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15pt; }
  .card { background-color: white; padding: 12pt; border-radius: 8pt; }
  .h3-box { border-bottom: 2pt solid #AAB7B8; margin-bottom: 5pt; padding-bottom: 3pt; }
  h3 { color: #1C2833; margin: 0; font-size: 16pt; }
  p { font-size: 13pt; margin: 0 0 5pt 0; line-height: 1.2; }
  .eps { color: #2E4053; font-weight: bold; }
</style>
</head>
<body>
<div class="slide">
  <div class="h1-box"><h1>深入解析：先進封裝</h1></div>
  <p style="margin-bottom: 15pt; font-size: 14pt;">台積電產能擴張帶動本土設備商長線超級循環。</p>
  <div class="grid">
    <div class="card">
      <div class="h3-box"><h3>弘塑 (3131)</h3></div>
      <p>濕製程設備主力/獨家供應商，享最高毛利與寡占紅利。</p>
      <p class="eps">2026 預估 EPS: 130.0~140.0</p>
    </div>
    <div class="card">
      <div class="h3-box"><h3>辛耘 (3583)</h3></div>
      <p>濕製程設備市占擴大，訂單能見度已達 2025 年底。</p>
      <p class="eps">2026 預估 EPS: 40.0~55.0</p>
    </div>
    <div class="card">
      <div class="h3-box"><h3>中砂 (1560)</h3></div>
      <p>鑽石碟切入先進製程與 HBM 需求，高階產品佔比穩升。</p>
      <p class="eps">2026 預估 EPS: 12.27</p>
    </div>
  </div>
</div>
</body>
</html>
