<!DOCTYPE html>
<html>
<head>
<style>
  body { font-family: 'Helvetica', Arial, sans-serif; width: 720pt; height: 405pt; margin: 0; padding: 0; background-color: #F4F6F6; color: #1C2833; overflow: hidden; display: flex; }
  .slide { padding: 40pt; width: 640pt; height: 325pt; display: flex; flex-direction: column; }
  .h1-box { border-left: 10pt solid #1C2833; padding-left: 15pt; margin-bottom: 20pt; }
  h1 { font-size: 32pt; color: #1C2833; margin: 0; }
  .content { display: flex; gap: 20pt; }
  .text { flex: 1; }
  .image-box { flex: 1; }
  img { width: 100%; border-radius: 5pt; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10pt; margin-top: 10pt; }
  .item { background-color: #EBF5FB; padding: 10pt; border-radius: 5pt; }
  .item p { font-size: 14pt; margin: 0; line-height: 1.3; }
  .item b { color: #1C2833; }
</style>
</head>
<body>
<div class="slide">
  <div class="h1-box"><h1>供應鏈現實：全面漲價與緊缺</h1></div>
  <div class="content">
    <div class="text">
      <p style="font-size: 16pt; margin-bottom: 10pt;">產能排擠與上游減產發酵，迎來強勢賣方市場。</p>
      <div class="grid">
        <div class="item"><p><b>先進封裝瓶頸</b><br>CoWoS 供不應求，交期延長至 6 季。</p></div>
        <div class="item"><p><b>記憶體緊缺</b><br>SLC/MLC NAND 減產 20-30%，報價墊高。</p></div>
        <div class="item"><p><b>被動元件調漲</b><br>MLCC 調漲 20%，台廠迎來轉單。</p></div>
        <div class="item"><p><b>功率半導體漲價</b><br>客戶重啟拉貨，結束一年半庫存調整。</p></div>
      </div>
    </div>
    <div class="image-box">
      <img src="../images/c44be3991f5b2e217e8c9490df2c8381f8b9f1ec577599669839fd9911535ae6.jpg" alt="Supply Chain">
    </div>
  </div>
</div>
</body>
</html>
