<!DOCTYPE html>
<html>
<head>
<style>
  body { font-family: 'Helvetica', Arial, sans-serif; width: 720pt; height: 405pt; margin: 0; padding: 0; background-color: #F4F6F6; color: #1C2833; overflow: hidden; display: flex; }
  .slide { padding: 30pt 40pt; width: 640pt; height: 345pt; display: flex; flex-direction: column; }
  .h1-box { border-left: 10pt solid #1C2833; padding-left: 15pt; margin-bottom: 15pt; }
  h1 { font-size: 32pt; color: #1C2833; margin: 0; }
  .theme { display: flex; align-items: flex-start; gap: 15pt; margin-bottom: 10pt; }
  .number-box { background-color: #1C2833; width: 35pt; height: 35pt; display: flex; align-items: center; justify-content: center; border-radius: 50%; flex-shrink: 0; }
  .number-box p { font-size: 20pt; font-weight: bold; margin: 0; color: white; }
  .text { flex: 1; }
  .text h3 { margin: 0; font-size: 18pt; color: #2E4053; }
  .text p { margin: 2pt 0 0 0; font-size: 15pt; line-height: 1.3; }
</style>
</head>
<body>
<div class="slide">
  <div class="h1-box"><h1>三大核心投資主題</h1></div>
  <div class="theme">
    <div class="number-box"><p>1</p></div>
    <div class="text">
      <h3>AI 基礎設施升級</h3>
      <p>聚焦受惠於 GB200 架構轉換的液冷散熱雙雄與高階 CCL 獨家供應商。</p>
    </div>
  </div>
  <div class="theme">
    <div class="number-box"><p>2</p></div>
    <div class="text">
      <h3>先進封裝超級循環</h3>
      <p>鎖定直接受惠台積電 CoWoS/SOIC 資本支出擴張的濕製程設備與檢測龍頭。</p>
    </div>
  </div>
  <div class="theme">
    <div class="number-box"><p>3</p></div>
    <div class="text">
      <h3>供需反轉與定價權</h3>
      <p>佈局因原廠減產或漲價，具備低價庫存優勢與轉單效應的零組件廠。</p>
    </div>
  </div>
</div>
</body>
</html>
