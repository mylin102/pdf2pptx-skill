<!DOCTYPE html>
<html>
<head>
<style>
  body { font-family: 'Helvetica', Arial, sans-serif; width: 720pt; height: 405pt; margin: 0; padding: 0; background-color: #F4F6F6; color: #1C2833; overflow: hidden; display: flex; }
  .slide { padding: 40pt; width: 640pt; height: 325pt; display: flex; flex-direction: column; }
  .h1-box { border-left: 10pt solid #1C2833; padding-left: 15pt; margin-bottom: 20pt; }
  h1 { font-size: 32pt; color: #1C2833; margin: 0; }
  .content { display: flex; align-items: center; gap: 20pt; }
  .text-box { flex: 0.8; }
  .image-box { flex: 1.2; }
  img { width: 100%; border-radius: 5pt; }
  .legend { font-size: 14pt; margin-top: 10pt; }
  .item { display: flex; align-items: center; gap: 10pt; margin-bottom: 8pt; }
  .item p { margin: 0; font-size: 12pt; }
  .dot { width: 10pt; height: 10pt; border-radius: 50%; flex-shrink: 0; }
</style>
</head>
<body>
<div class="slide">
  <div class="h1-box"><h1>估值與成長性矩陣</h1></div>
  <div class="content">
    <div class="text-box">
      <p style="font-size: 16pt; margin-bottom: 15pt;">精準定位尚未反映爆發力的「黃金象限」。</p>
      <div class="legend">
        <div class="item"><div class="dot" style="background-color: #2ECC71;"></div> <p>Sweet Spot (高成長，合理估值)</p></div>
        <div class="item"><div class="dot" style="background-color: #F1C40F;"></div> <p>Premium Valuation (高成長，高估值)</p></div>
        <div class="item"><div class="dot" style="background-color: #3498DB;"></div> <p>Steady Growth (穩健成長，合理估值)</p></div>
      </div>
    </div>
    <div class="image-box">
      <img src="../images/e8e64bbf9a5bcd33d6cca5881d4b6c30a23eae641bc3fa1f6a088606c8da4030.jpg" alt="Valuation Matrix">
    </div>
  </div>
</div>
</body>
</html>
