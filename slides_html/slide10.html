<!DOCTYPE html>
<html>
<head>
<style>

  .slide { padding: 40pt; width: 640pt; height: 325pt; display: flex; flex-direction: column; }

  .label-box { background-color: #2E4053; color: white; padding: 5pt 10pt; border-radius: 3pt; width: 100pt; text-align: center; }
  .label-box p { font-weight: bold; margin: 0; color: white; font-size: 14pt; }
  .text-box { flex: 1; }
  .text-box p { font-size: 14pt; margin: 0; }
  .eps-box { width: 120pt; text-align: right; }
  .eps-box p { font-weight: bold; margin: 0; color: #1C2833; font-size: 14pt; }
</style>
</head>
<body>
<div class="slide">

  <div class="row">
    <div class="label-box"><p>臻鼎-KY</p></div>
    <div class="text-box"><p>受惠 AI 伺服器主板、高階 HDI 及 ABF 載板放量。</p></div>
    <div class="eps-box"><p>2026 EPS: 10.31</p></div>
  </div>
  <div class="row">

    <div class="text-box"><p>M8 材料順利通過認證，800G 交換器板材持續放量。</p></div>
    <div class="eps-box"><p>2026 EPS: 21.33</p></div>
  </div>
  <div class="row">
    <div class="label-box"><p>台光電</p></div>
    <div class="text-box"><p>NVIDIA LPU M9 規格 CCL 獨家供應商。</p></div>
    <div class="eps-box"><p>2026 EPS: 72.66</p></div>
  </div>
</div>
</body>
</html>
