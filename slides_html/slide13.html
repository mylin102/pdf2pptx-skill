<!DOCTYPE html>
<html>
<head>
<style>
  body { font-family: 'Helvetica', Arial, sans-serif; width: 720pt; height: 405pt; margin: 0; padding: 0; background-color: #F4F6F6; color: #1C2833; overflow: hidden; display: flex; }
  .slide { padding: 40pt; width: 640pt; height: 325pt; display: flex; flex-direction: column; }
  .h1-box { border-left: 10pt solid #C0392B; padding-left: 15pt; margin-bottom: 20pt; }
  h1 { font-size: 32pt; color: #1C2833; margin: 0; }
  .risk-card { background-color: #FDEDEC; border: 1pt solid #E74C3C; border-radius: 8pt; padding: 15pt; margin-bottom: 20pt; }
  .risk-title-box { margin-bottom: 5pt; }
  .risk-title-box p { color: #C0392B; font-weight: bold; font-size: 18pt; margin: 0; }
  .risk-desc-box p { font-size: 14pt; color: #1C2833; margin: 0; line-height: 1.3; }
</style>
</head>
<body>
<div class="slide">
  <div class="h1-box"><h1>宏觀風險警示</h1></div>
  <div class="risk-card">
    <div class="risk-title-box"><p>能源與地緣政治</p></div>
    <div class="risk-desc-box"><p>中東天然氣田遭襲，引發石化原料供給。考驗特用化學品廠向下游轉嫁成本的能力。</p></div>
  </div>
  <div class="risk-card">
    <div class="risk-title-box"><p>原物料價格暴漲</p></div>
    <div class="risk-desc-box"><p>LME 銅價大漲逾 60%，侵蝕短期毛利。需觀察 CCL 與 PCB 廠能否順利調漲報價。</p></div>
  </div>
</div>
</body>
</html>
