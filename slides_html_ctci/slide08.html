<!DOCTYPE html>
<html>
<head>
<style>
  body { font-family: 'Helvetica', Arial, sans-serif; width: 720pt; height: 405pt; margin: 0; padding: 0; background-color: #F4F6F6; color: #1C2833; overflow: hidden; display: flex; }
  .slide { padding: 30pt 40pt; width: 640pt; height: 345pt; display: flex; flex-direction: column; }
  .h1-box { border-left: 10pt solid #1C2833; padding-left: 15pt; margin-bottom: 15pt; }
  h1 { font-size: 28pt; color: #1C2833; margin: 0; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15pt; }
  .card { background-color: white; padding: 12pt; border-radius: 8pt; border-top: 3pt solid #2E4053; }
  .card h3 { color: #1C2833; margin: 0 0 5pt 0; font-size: 16pt; }
  .card p { font-size: 12pt; margin: 0; line-height: 1.3; color: #566573; }
</style>
</head>
<body>
<div class="slide">
  <div class="h1-box"><h1>D-R-A-P 引擎細節解析</h1></div>
  <div class="grid">
    <div class="card">
      <h3>D: Digital Twin</h3>
      <p>匯入 BIM 模型與合約條款。主動注入「設備遲交」、「颶風停工」等一萬次失敗情境。</p>
    </div>
    <div class="card">
      <h3>R: Risk Testing</h3>
      <p>運用自駕車動態路徑算法，精算「關鍵路徑 (Critical Path)」偏移量與連鎖反應成本。</p>
    </div>
    <div class="card">
      <h3>A: AI Mitigation</h3>
      <p>AI 自動生成 Fail-Safe (備援替換) 或 Degraded Mode (降級施工) 方案，並計算 ROI。</p>
    </div>
    <div class="card">
      <h3>P: Predictive Feedback</h3>
      <p>現場 AI 影像聯動，若現實偏差達 ASIL-D 等級，警報直達執行長。</p>
    </div>
  </div>
</div>
</body>
</html>
