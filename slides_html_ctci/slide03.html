<!DOCTYPE html>
<html>
<head>
<style>
  body { font-family: 'Helvetica', Arial, sans-serif; width: 720pt; height: 405pt; margin: 0; padding: 0; background-color: #F4F6F6; color: #1C2833; overflow: hidden; display: flex; }
  .slide { padding: 30pt 40pt; width: 640pt; height: 345pt; display: flex; flex-direction: column; }
  .h1-box { border-left: 10pt solid #1C2833; padding-left: 15pt; margin-bottom: 15pt; }
  h1 { font-size: 28pt; color: #1C2833; margin: 0; }
  .flex-row { display: flex; gap: 30pt; align-items: flex-start; }
  .text-side { flex: 1; }
  .image-side { flex: 1; text-align: center; }
  img { max-width: 100%; border-radius: 5pt; box-shadow: 0 4pt 8pt rgba(0,0,0,0.1); }
  .metric { margin-bottom: 15pt; }
  .metric-value { font-size: 24pt; font-weight: bold; color: #2E4053; }
  .metric-label { font-size: 14pt; }
</style>
</head>
<body>
<div class="slide">
  <div class="h1-box"><h1>強勁財務實力與流動性</h1></div>
  <div class="flex-row">
    <div class="text-side">
      <div class="metric">
        <div class="metric-value"><p>3,334 億</p></div>
        <div class="metric-label"><p>2024 Q1 在建工程總額</p></div>
      </div>
      <div class="metric">
        <div class="metric-value"><p>279.04 億</p></div>
        <div class="metric-label"><p>現金與約當現金</p></div>
      </div>
      <p style="font-size: 12pt; color: #2E4053; line-height: 1.2;">員工信託持股信心極高：3,500 人中僅 21 人終止參與。</p>
    </div>
    <div class="image-side">
      <img src="../ctci_mineru_out/CTCI_Strategy/auto/images/20dc87e4a6690067e1bef29185218b7bdf42e555cd7185e04eddb52322c4174a.jpg" alt="Financial Power">
    </div>
  </div>
</div>
</body>
</html>
