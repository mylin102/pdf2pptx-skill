<!DOCTYPE html>
<html>
<head>
<style>
  body { font-family: 'Helvetica', Arial, sans-serif; width: 720pt; height: 405pt; margin: 0; padding: 0; background-color: #F4F6F6; color: #1C2833; overflow: hidden; display: flex; }
  .slide { padding: 40pt; width: 640pt; height: 325pt; display: flex; flex-direction: column; }
  .h1-box { border-left: 10pt solid #C0392B; padding-left: 15pt; margin-bottom: 20pt; }
  h1 { font-size: 32pt; color: #1C2833; margin: 0; }
  .content { display: flex; gap: 20pt; }
  .box { flex: 1; background-color: white; padding: 15pt; border-radius: 8pt; border-top: 5pt solid #C0392B; }
  .box h3 { margin-top: 0; font-size: 20pt; color: #C0392B; margin-bottom: 10pt; }
  .box p { font-size: 15pt; margin-bottom: 10pt; line-height: 1.4; }
  ul { padding-left: 20pt; font-size: 14pt; }
  li { margin-bottom: 8pt; }
</style>
</head>
<body>
<div class="slide">
  <div class="h1-box"><h1>壓力測試：美國 BKRF 196 億危機</h1></div>
  <div class="content">
    <div class="box">
      <h3>現況處置</h3>
      <ul>
        <li>2024 Q1 認列 31 億元預期信用減損。</li>
        <li>重整計畫生效，確保 0.75 億美元優先受償。</li>
        <li>接手 1 年期 O&M 服務，維持營運。</li>
      </ul>
    </div>
    <div class="box" style="border-top-color: #2E4053;">
      <h3 style="color: #2E4053;">戰略定調</h3>
      <p>「錢沒有拿不回來，只是 5 年後售廠收回。」</p>
      <p style="font-size: 12pt; color: #566573;">—— 引述董事長觀點，將危機視為極致的壓力測試。</p>
    </div>
  </div>
</div>
</body>
</html>
