<!DOCTYPE html>
<html>
<head>
<style>
  body { font-family: 'Helvetica', Arial, sans-serif; width: 720pt; height: 405pt; margin: 0; padding: 0; background-color: #F4F6F6; color: #1C2833; overflow: hidden; display: flex; }
  .slide { padding: 40pt; width: 640pt; height: 325pt; display: flex; flex-direction: column; }
  .h1-box { border-left: 10pt solid #1C2833; padding-left: 15pt; margin-bottom: 20pt; }
  h1 { font-size: 32pt; color: #1C2833; margin: 0; }
  .flow-container { display: flex; justify-content: space-between; align-items: center; margin-top: 30pt; }
  .step { width: 130pt; text-align: center; }
  .circle { width: 60pt; height: 60pt; background-color: #1C2833; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24pt; font-weight: bold; margin: 0 auto 10pt auto; }
  .step h3 { margin: 0; font-size: 16pt; color: #2E4053; }
  .arrow { font-size: 24pt; color: #AAB7B8; }
</style>
</head>
<body>
<div class="slide">
  <div class="h1-box"><h1>中鼎智慧工程大腦：D-R-A-P 流程</h1></div>
  <p style="font-size: 16pt; text-align: center;">實現超越傳統管理的預測性安全與效率提升</p>
  <div class="flow-container">
    <div class="step">
      <div class="circle"><p>D</p></div>
      <h3>數位孿生</h3>
    </div>
    <div class="arrow"><p>➔</p></div>
    <div class="step">
      <div class="circle"><p>R</p></div>
      <h3>壓力測試</h3>
    </div>
    <div class="arrow"><p>➔</p></div>
    <div class="step">
      <div class="circle"><p>A</p></div>
      <h3>AI 優化</h3>
    </div>
    <div class="arrow"><p>➔</p></div>
    <div class="step">
      <div class="circle"><p>P</p></div>
      <h3>即時回饋</h3>
    </div>
  </div>
</div>
</body>
</html>
