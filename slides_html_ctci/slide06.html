<!DOCTYPE html>
<html>
<head>
<style>
  body { font-family: 'Helvetica', Arial, sans-serif; width: 720pt; height: 405pt; margin: 0; padding: 0; background-color: #F4F6F6; color: #1C2833; overflow: hidden; display: flex; }
  .slide { padding: 40pt; width: 640pt; height: 325pt; display: flex; flex-direction: column; }
  .h1-box { border-left: 10pt solid #1C2833; padding-left: 15pt; margin-bottom: 20pt; }
  h1 { font-size: 32pt; color: #1C2833; margin: 0; }
  .concept-box { background-color: #1C2833; color: white; padding: 20pt; border-radius: 10pt; text-align: center; }
  .concept-box h2 { color: #AAB7B8; margin-top: 0; }
  .flex-row { display: flex; justify-content: space-around; margin-top: 20pt; }
  .arrow { font-size: 30pt; color: #2E4053; }
  .box { border: 2pt solid #2E4053; padding: 10pt; border-radius: 5pt; width: 200pt; text-align: center; }
  .box p { margin: 5pt 0; font-size: 14pt; }
</style>
</head>
<body>
<div class="slide">
  <div class="h1-box"><h1>戰略典範轉移：植入車規級基因</h1></div>
  <div class="concept-box">
    <h2>核心概念：從「事後追認」轉向「感測止損」</h2>
    <p style="font-size: 16pt;">不是等撞車了才修車，而是在感測到危險前 0.1 秒自動介入煞車。</p>
  </div>
  <div class="flex-row">
    <div class="box">
      <p><b>汽車工業 (Automotive)</b></p>
      <p>ISO 26262 功能安全</p>
      <p>Fail-Operational</p>
    </div>
    <div class="arrow"><p>➔</p></div>
    <div class="box">
      <p><b>統包工程 (EPC Future)</b></p>
      <p>IEC 61508 系統安全</p>
      <p>動態止損與優化</p>
    </div>
  </div>
</div>
</body>
</html>
