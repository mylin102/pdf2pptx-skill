<!DOCTYPE html>
<html>
<head>
<style>
  body { font-family: 'Helvetica', Arial, sans-serif; width: 720pt; height: 405pt; margin: 0; padding: 0; background-color: #F4F6F6; color: #1C2833; overflow: hidden; display: flex; }
  .slide { padding: 40pt; width: 640pt; height: 325pt; display: flex; flex-direction: column; }
  .h1-box { border-left: 10pt solid #1C2833; padding-left: 15pt; margin-bottom: 20pt; }
  h1 { font-size: 28pt; color: #1C2833; margin: 0; }
  .org-chart { display: flex; flex-direction: column; align-items: center; gap: 15pt; margin-top: 10pt; }
  .level { background-color: white; padding: 10pt 20pt; border-radius: 5pt; border: 1pt solid #2E4053; width: 450pt; text-align: center; box-shadow: 0 2pt 4pt rgba(0,0,0,0.05); }
  .level h3 { margin: 0 0 5pt 0; color: #1C2833; font-size: 16pt; }
  .level p { margin: 0; font-size: 13pt; color: #566573; line-height: 1.3; }
  .highlight-level { border-color: #C0392B; border-width: 2pt; background-color: #FDEDEC; }
</style>
</head>
<body>
<div class="slide">
  <div class="h1-box"><h1>董事長室戰略延伸：決策防護網</h1></div>
  <div class="org-chart">
    <div class="level">
      <h3>Chairman & CEO</h3>
      <p>聚焦 6,330 億商機全球佈局與資本調度，擺脫細碎回報。</p>
    </div>
    <div class="level highlight-level">
      <h3>Digital Strategic CDO Office (MY Lin)</h3>
      <p>核心過濾器：執行 D-R-A-P 引擎，僅上報 ASIL-D 變異與 ROI 方案。</p>
    </div>
    <div class="level">
      <h3>Global EPC Projects (US, ME, Taiwan)</h3>
      <p>數據自動匯入，實現穿透式管理，消除傳統層層掩飾。</p>
    </div>
  </div>
</div>
</body>
</html>
