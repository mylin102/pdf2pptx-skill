<!DOCTYPE html>
<html>
<head>
<style>
  body { font-family: 'Helvetica', Arial, sans-serif; width: 720pt; height: 405pt; margin: 0; padding: 0; background-color: #F4F6F6; color: #1C2833; overflow: hidden; display: flex; }
  .slide { padding: 40pt; width: 640pt; height: 325pt; display: flex; flex-direction: column; }
  .h1-box { border-left: 10pt solid #1C2833; padding-left: 15pt; margin-bottom: 20pt; }
  h1 { font-size: 32pt; color: #1C2833; margin: 0; }
  .comparison { display: grid; grid-template-columns: 1fr 1fr; gap: 20pt; }
  .h3-box { border-bottom: 2pt solid #AAB7B8; padding-bottom: 5pt; margin-bottom: 10pt; }
  h3 { color: #2E4053; margin: 0; font-size: 18pt; }
  ul { padding-left: 20pt; font-size: 14pt; }
  li { margin-bottom: 15pt; }
  .highlight { color: #C0392B; font-weight: bold; }
</style>
</head>
<body>
<div class="slide">
  <div class="h1-box"><h1>傳統 EPC 管理的物理極限</h1></div>
  <div class="comparison">
    <div class="column">
      <div class="h3-box"><h3>傳統 EPC 管理盲區</h3></div>
      <ul>
        <li><span class="highlight">落後財務防禦：</span>過度依賴完工百分比法，資金鏈瞬間失衡。</li>
        <li><span class="highlight">事後追補習慣：</span>習慣事後申請追加，爭議如滾雪球擴大。</li>
        <li><span class="highlight">管理鞭長莫及：</span>海外專案缺乏即時監控，無法攔截風險。</li>
      </ul>
    </div>
    <div class="column">
      <div class="h3-box"><h3>次世代數位防禦需求</h3></div>
      <ul>
        <li><strong>事前預防數位孿生：</strong>開工前完成所有設計與成本超支壓力測試。</li>
        <li><strong>動態風控儀表板：</strong>建立數據驅動的即時止損機制。</li>
        <li><strong>車規級容錯底線：</strong>導入「失效後維持運作」的安全精神。</li>
      </ul>
    </div>
  </div>
</div>
</body>
</html>
