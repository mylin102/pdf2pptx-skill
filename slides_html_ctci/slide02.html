<!DOCTYPE html>
<html>
<head>
<style>
  body { font-family: 'Helvetica', Arial, sans-serif; width: 720pt; height: 405pt; margin: 0; padding: 0; background-color: #F4F6F6; color: #1C2833; overflow: hidden; display: flex; }
  .slide { padding: 40pt; width: 640pt; height: 325pt; display: flex; flex-direction: column; }
  .h1-box { border-left: 10pt solid #1C2833; padding-left: 15pt; margin-bottom: 20pt; }
  h1 { font-size: 32pt; color: #1C2833; margin: 0; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20pt; margin-top: 10pt; }
  .stat-box { background-color: white; padding: 20pt; border-radius: 10pt; box-shadow: 0 4pt 6pt rgba(0,0,0,0.1); }
  .stat-value { font-size: 36pt; font-weight: bold; color: #2E4053; margin-bottom: 5pt; }
  .stat-label { font-size: 16pt; color: #1C2833; }
  p { font-size: 18pt; line-height: 1.6; }
</style>
</head>
<body>
<div class="slide">
  <div class="h1-box"><h1>基業長青：全球百大工程版圖</h1></div>
  <div class="grid">
    <div class="stat-box">
      <div class="stat-value"><p>126 / 59</p></div>
      <div class="stat-label"><p>ENR 全球/國際工程承包商排名</p></div>
    </div>
    <div class="stat-box">
      <div class="stat-value"><p>Top 1%</p></div>
      <div class="stat-label"><p>S&P Global 永續年鑑最高榮譽</p></div>
    </div>
  </div>
  <div style="margin-top: 20pt;">
    <p>CTCI 中鼎集團持續深耕全球市場，穩居國際統包工程領先地位。</p>
  </div>
</div>
</body>
</html>
