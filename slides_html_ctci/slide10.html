<!DOCTYPE html>
<html>
<head>
<style>
  body { font-family: 'Helvetica', Arial, sans-serif; width: 720pt; height: 405pt; margin: 0; padding: 0; background-color: #F4F6F6; color: #1C2833; overflow: hidden; display: flex; }
  .slide { padding: 40pt; width: 640pt; height: 325pt; display: flex; flex-direction: column; }
  .h1-box { border-left: 10pt solid #1C2833; padding-left: 15pt; margin-bottom: 20pt; }
  h1 { font-size: 28pt; color: #1C2833; margin: 0; }
  .profile-grid { display: grid; grid-template-columns: 1fr 1.5fr; gap: 20pt; }
  .photo-box { background-color: #D5D8DC; border-radius: 10pt; height: 200pt; display: flex; align-items: center; justify-content: center; }
  .photo-box p { font-size: 14pt; font-weight: bold; color: #566573; }
  .bio-box h2 { margin: 0 0 10pt 0; color: #2E4053; }
  ul { padding-left: 20pt; font-size: 13pt; margin: 0; }
  li { margin-bottom: 8pt; }
</style>
</head>
<body>
<div class="slide">
  <div class="h1-box"><h1>數位藍圖操盤手：戰略中樞</h1></div>
  <div class="profile-grid">
    <div class="photo-box"><p>林明彥 (MY Lin)</p></div>
    <div class="bio-box">
      <h2>跨界系統整合與戰略幕僚</h2>
      <ul>
        <li><strong>學歷：</strong>台大機械工程碩士 (專攻閉環控制邏輯)。</li>
        <li><strong>定位：</strong>跨界系統整合者、從 0 到 1 孵化器。</li>
        <li><strong>核心能力：</strong>技術洞察、風險與供應戰略、國際談判、跨領域溝通整合。</li>
        <li><strong>目標角色：</strong>集團數位戰略長 (CDO) 幕僚 / 技術特助。</li>
      </ul>
    </div>
  </div>
</div>
</body>
</html>
